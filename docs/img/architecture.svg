<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arw" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arwd" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#0a0e17"/>

  <!-- title -->
  <text x="40" y="52" fill="#e6edf7" font-size="30" font-weight="bold">AEGIS — Insider Threat &amp; Privileged Access Defense</text>
  <text x="40" y="82" fill="#8595b3" font-size="17">Real-time UEBA · MITRE-mapped detection · risk-based access &amp; JIT PAM · quantum-safe crypto</text>
  <text x="1560" y="52" text-anchor="end" fill="#2dd4bf" font-size="16" font-weight="bold">FinSpark 2026 · PS-1</text>

  <!-- ===== Stage 1: Log Sources ===== -->
  <rect x="30" y="150" width="210" height="320" rx="12" fill="#111726" stroke="#1e2b45" stroke-width="1.5"/>
  <text x="50" y="182" fill="#22d3ee" font-size="17" font-weight="bold">LOG SOURCES</text>
  <text x="50" y="205" fill="#8595b3" font-size="13">Bank telemetry</text>
  <g fill="#cdd8ee" font-size="14">
    <rect x="48" y="220" width="174" height="30" rx="6" fill="#0d1526" stroke="#22324f"/><text x="60" y="240">AD / LDAP identity</text>
    <rect x="48" y="256" width="174" height="30" rx="6" fill="#0d1526" stroke="#22324f"/><text x="60" y="276">PAM gateway sessions</text>
    <rect x="48" y="292" width="174" height="30" rx="6" fill="#0d1526" stroke="#22324f"/><text x="60" y="312">Core-banking / GL</text>
    <rect x="48" y="328" width="174" height="30" rx="6" fill="#0d1526" stroke="#22324f"/><text x="60" y="348">DB audit &amp; queries</text>
    <rect x="48" y="364" width="174" height="30" rx="6" fill="#0d1526" stroke="#22324f"/><text x="60" y="384">VPN / endpoint</text>
    <rect x="48" y="400" width="174" height="30" rx="6" fill="#0d1526" stroke="#22324f"/><text x="60" y="420">DLP / USB / email</text>
  </g>

  <!-- ===== Stage 2: Normalize ===== -->
  <rect x="280" y="245" width="170" height="130" rx="12" fill="#111726" stroke="#1e2b45" stroke-width="1.5"/>
  <text x="298" y="278" fill="#22d3ee" font-size="17" font-weight="bold">NORMALIZE</text>
  <text x="298" y="303" fill="#cdd8ee" font-size="14">ECS-style Event</text>
  <text x="298" y="325" fill="#cdd8ee" font-size="14">schema — one</text>
  <text x="298" y="347" fill="#cdd8ee" font-size="14">model, any source</text>

  <!-- ===== Stage 3: Detection ===== -->
  <rect x="490" y="130" width="270" height="360" rx="12" fill="#0f1830" stroke="#26406e" stroke-width="1.5"/>
  <text x="510" y="162" fill="#a78bfa" font-size="17" font-weight="bold">DETECTION PLANE</text>

  <rect x="508" y="178" width="234" height="150" rx="10" fill="#141d33" stroke="#3a2f6b" stroke-width="1.5"/>
  <text x="524" y="204" fill="#c4b5fd" font-size="15" font-weight="bold">UEBA · AI behaviour</text>
  <text x="524" y="228" fill="#cdd8ee" font-size="13.5">• Autoencoder (novelty)</text>
  <text x="524" y="250" fill="#cdd8ee" font-size="13.5">• Isolation Forest</text>
  <text x="524" y="272" fill="#cdd8ee" font-size="13.5">• Self baseline (MAD z)</text>
  <text x="524" y="294" fill="#cdd8ee" font-size="13.5">• Peer-group baseline</text>
  <text x="524" y="316" fill="#8595b3" font-size="12.5">→ explainable drivers</text>

  <rect x="508" y="338" width="234" height="136" rx="10" fill="#141d33" stroke="#3a2f6b" stroke-width="1.5"/>
  <text x="524" y="364" fill="#c4b5fd" font-size="15" font-weight="bold">MITRE rule engine</text>
  <text x="524" y="388" fill="#cdd8ee" font-size="13.5">12 rules → ATT&amp;CK TTPs</text>
  <text x="524" y="410" fill="#cdd8ee" font-size="13.5">Exfil · PrivEsc · T1070</text>
  <text x="524" y="432" fill="#cdd8ee" font-size="13.5">Brute-force · Backdoor</text>
  <text x="524" y="454" fill="#8595b3" font-size="12.5">near-zero false positives</text>

  <!-- ===== Stage 4: Risk ===== -->
  <rect x="800" y="235" width="210" height="150" rx="12" fill="#111726" stroke="#1e2b45" stroke-width="1.5"/>
  <text x="820" y="267" fill="#f59e0b" font-size="17" font-weight="bold">RISK ENGINE</text>
  <text x="820" y="292" fill="#cdd8ee" font-size="13.5">Composite score</text>
  <text x="820" y="313" fill="#cdd8ee" font-size="13.5">behaviour+rules+ctx</text>
  <text x="820" y="334" fill="#cdd8ee" font-size="13.5">time-decay · tiers</text>
  <text x="820" y="360" fill="#8595b3" font-size="12.5">LOW→CRITICAL</text>

  <!-- ===== Stage 5: Enforcement ===== -->
  <rect x="1050" y="130" width="270" height="360" rx="12" fill="#0f1830" stroke="#26406e" stroke-width="1.5"/>
  <text x="1070" y="162" fill="#34d399" font-size="17" font-weight="bold">ENFORCEMENT</text>

  <rect x="1068" y="178" width="234" height="150" rx="10" fill="#0c1f1a" stroke="#155e4a" stroke-width="1.5"/>
  <text x="1084" y="204" fill="#6ee7b7" font-size="15" font-weight="bold">Risk-based access</text>
  <text x="1084" y="230" fill="#cdd8ee" font-size="13.5">ALLOW</text>
  <text x="1084" y="252" fill="#cdd8ee" font-size="13.5">STEP-UP MFA</text>
  <text x="1084" y="274" fill="#cdd8ee" font-size="13.5">REQUIRE JIT APPROVAL</text>
  <text x="1084" y="296" fill="#cdd8ee" font-size="13.5">DENY + ALERT</text>
  <text x="1084" y="318" fill="#8595b3" font-size="12.5">adaptive least-privilege</text>

  <rect x="1068" y="338" width="234" height="136" rx="10" fill="#0c1f1a" stroke="#155e4a" stroke-width="1.5"/>
  <text x="1084" y="364" fill="#6ee7b7" font-size="15" font-weight="bold">JIT PAM broker</text>
  <text x="1084" y="388" fill="#cdd8ee" font-size="13.5">Maker-checker approval</text>
  <text x="1084" y="410" fill="#cdd8ee" font-size="13.5">Time-boxed elevation</text>
  <text x="1084" y="432" fill="#cdd8ee" font-size="13.5">No standing privilege</text>
  <text x="1084" y="454" fill="#8595b3" font-size="12.5">self-approval blocked</text>

  <!-- ===== Stage 6: Output ===== -->
  <rect x="1360" y="235" width="210" height="150" rx="12" fill="#111726" stroke="#1e2b45" stroke-width="1.5"/>
  <text x="1380" y="267" fill="#22d3ee" font-size="17" font-weight="bold">SOC + API</text>
  <text x="1380" y="292" fill="#cdd8ee" font-size="13.5">Live dashboard</text>
  <text x="1380" y="313" fill="#cdd8ee" font-size="13.5">Risk leaderboard</text>
  <text x="1380" y="334" fill="#cdd8ee" font-size="13.5">Alerts · JIT queue</text>
  <text x="1380" y="360" fill="#8595b3" font-size="12.5">REST /api/*</text>

  <!-- ===== flow arrows ===== -->
  <line x1="240" y1="310" x2="278" y2="310" stroke="#22d3ee" stroke-width="2.5" marker-end="url(#arw)"/>
  <line x1="450" y1="310" x2="488" y2="310" stroke="#22d3ee" stroke-width="2.5" marker-end="url(#arw)"/>
  <line x1="760" y1="310" x2="798" y2="310" stroke="#22d3ee" stroke-width="2.5" marker-end="url(#arw)"/>
  <line x1="1010" y1="310" x2="1048" y2="310" stroke="#22d3ee" stroke-width="2.5" marker-end="url(#arw)"/>
  <line x1="1320" y1="310" x2="1358" y2="310" stroke="#22d3ee" stroke-width="2.5" marker-end="url(#arw)"/>

  <!-- ===== Quantum-Safe Fabric band ===== -->
  <rect x="30" y="560" width="1540" height="200" rx="14" fill="#0b1622" stroke="#0f766e" stroke-width="2"/>
  <text x="52" y="598" fill="#2dd4bf" font-size="20" font-weight="bold">⚛ QUANTUM-SAFE CRYPTOGRAPHY FABRIC (QPC)</text>
  <text x="52" y="623" fill="#8595b3" font-size="14">Protects credentials &amp; audit artefacts against harvest-now / decrypt-later quantum attacks · NIST FIPS 203 / 204</text>

  <rect x="52" y="640" width="360" height="100" rx="10" fill="#0c1f1a" stroke="#155e4a"/>
  <text x="72" y="668" fill="#6ee7b7" font-size="15" font-weight="bold">ML-KEM-768 credential vault</text>
  <text x="72" y="692" fill="#cdd8ee" font-size="13">Envelope encryption · AES-256-GCM</text>
  <text x="72" y="713" fill="#cdd8ee" font-size="13">data key wrapped by lattice KEM</text>
  <text x="72" y="733" fill="#8595b3" font-size="12">FIPS 203 · hybrid + X25519</text>

  <rect x="432" y="640" width="380" height="100" rx="10" fill="#0c1f1a" stroke="#155e4a"/>
  <text x="452" y="668" fill="#6ee7b7" font-size="15" font-weight="bold">ML-DSA-65 signed audit chain</text>
  <text x="452" y="692" fill="#cdd8ee" font-size="13">Hash-linked, PQC-signed blocks</text>
  <text x="452" y="713" fill="#cdd8ee" font-size="13">tamper-evident &amp; non-repudiable</text>
  <text x="452" y="733" fill="#8595b3" font-size="12">FIPS 204 · defeats T1070 log wipe</text>

  <rect x="832" y="640" width="360" height="100" rx="10" fill="#0c1f1a" stroke="#155e4a"/>
  <text x="852" y="668" fill="#6ee7b7" font-size="15" font-weight="bold">Provider tiers (auto-select)</text>
  <text x="852" y="692" fill="#cdd8ee" font-size="13">1· liboqs  2· pure-py ML-KEM/DSA</text>
  <text x="852" y="713" fill="#cdd8ee" font-size="13">3· classical fallback (reported)</text>
  <text x="852" y="733" fill="#8595b3" font-size="12">posture always truthful</text>

  <rect x="1212" y="640" width="336" height="100" rx="10" fill="#0c1f1a" stroke="#155e4a"/>
  <text x="1232" y="668" fill="#6ee7b7" font-size="15" font-weight="bold">Compliance alignment</text>
  <text x="1232" y="692" fill="#cdd8ee" font-size="13">RBI PAM · maker-checker</text>
  <text x="1232" y="713" fill="#cdd8ee" font-size="13">least-privilege · session control</text>
  <text x="1232" y="733" fill="#8595b3" font-size="12">non-repudiable logging</text>

  <!-- arrows down into QPC band -->
  <line x1="625" y1="490" x2="625" y2="558" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arwd)"/>
  <text x="636" y="530" fill="#a78bfa" font-size="12">alerts signed</text>
  <line x1="1185" y1="490" x2="1185" y2="558" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arwd)"/>
  <text x="1196" y="530" fill="#a78bfa" font-size="12">grants signed</text>
  <line x1="905" y1="385" x2="905" y2="558" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arwd)"/>
  <text x="916" y="480" fill="#a78bfa" font-size="12">decisions signed</text>
</svg>
